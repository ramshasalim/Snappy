<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snappy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(135deg, #ff4fa3, #22c55e);
      color: white;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      z-index: 0;
      animation: float 8s infinite ease-in-out;
    }

    .blob1 {
      width: 300px;
      height: 300px;
      background: #ff7bc3;
      top: -80px;
      left: -60px;
    }

    .blob2 {
      width: 280px;
      height: 280px;
      background: #86efac;
      bottom: -100px;
      right: -80px;
    }

    @keyframes float {
      0% {
        transform: translateY(0px)
      }

      50% {
        transform: translateY(20px)
      }

      100% {
        transform: translateY(0px)
      }
    }

    .page {
      display: none;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    .active {
      display: flex;
    }

    #gamePage {
      padding-top: 60px;
      padding-bottom: 60px;
    }

    .card {
      width: 460px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      padding: 35px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 30px;
    }

    .tagline {
      text-align: center;
      color: #ffe8f5;
      margin-bottom: 28px;
      font-size: 15px;
    }

    .input-box {
      margin-bottom: 15px;
    }

    input,
    select {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 15px;
      outline: none;
    }

    input::placeholder {
      color: #f3f4f6;
    }

    select option {
      color: black;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 15px;
      background: #ff4fa3;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      background: #ff2f92;
      box-shadow: 0 10px 20px rgba(255, 79, 163, 0.3);
    }

    .difficulty-pill {
      width: max-content;
      margin: 0 auto 18px;
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
    }

    .task-box {
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 22px;
      padding: 28px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin: 22px 0;
      line-height: 1.4;
    }

    .upload-area {
      background: rgba(255, 255, 255, 0.12);
      border: 2px dashed rgba(255, 255, 255, 0.4);
      padding: 22px;
      border-radius: 20px;
      text-align: center;
      margin-bottom: 15px;
    }

    .upload-area input {
      background: none;
    }

    .leaderboard {
      margin-top: 35px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 22px;
      padding: 22px;
    }

    .leaderboard h3 {
      margin-bottom: 12px;
      text-align: center;
    }

    .leaderboard li {
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 18px;
      color: white;
      font-weight: 600;
    }

    .success {
      text-align: center;
      color: #d9f99d;
      margin-top: 12px;
      font-weight: 600;
    }

    .result-icon {
      font-size: 80px;
      text-align: center;
      margin-bottom: 10px;
    }

    .result-text {
      text-align: center;
      font-size: 20px;
      margin-top: 10px;
      line-height: 1.6;
    }
  </style>

</head>

<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- HOME PAGE -->

  <div class="page active" id="homePage">

    <div class="card">

      <h1>📸 Snappy</h1>

      <p class="tagline">
        Multiplayer Real-World Challenge Game
      </p>

      <div class="input-box">
        <input type="text" id="username" placeholder="Enter Your Name">
      </div>

      <div class="input-box">
        <select id="difficulty">

          <option value="easy">
            Easy
          </option>

          <option value="medium">
            Medium
          </option>

          <option value="hard">
            Hard
          </option>

        </select>
      </div>

      <button onclick="startGame()">
        Start Challenge 🚀
      </button>

    </div>

  </div>

  <!-- GAME PAGE -->

  <div class="page" id="gamePage">

    <div class="card">

      <h2>🎯 Your Challenge</h2>

      <div class="difficulty-pill" id="difficultyText"></div>

      <div class="task-box" id="task"></div>

      <div class="upload-area">

        <p style="margin-bottom:10px;">
          Upload your proof image 📷
        </p>

        <input type="file" id="imageUpload">

      </div>

      <button onclick="submitTask()">
        Submit Task
      </button>

      <div class="success" id="successMessage"></div>

      <div class="leaderboard">

        <h3>🏆 Live Leaderboard</h3>

        <ul id="leaderboardList">

          <li>
            <span>🥇 Suraj</span>
            <span>20 pts</span>
          </li>

          <li>
            <span>🥈 Muskan</span>
            <span>10 pts</span>
          </li>

          <li>
            <span>🥉 Shivam</span>
            <span>10 pts</span>
          </li>

        </ul>

      </div>

    </div>

  </div>

  <!-- RESULT PAGE -->

  <div class="page" id="resultPage">

    <div class="card">

      <div class="result-icon">
        🎉
      </div>

      <h2>Challenge Completed!</h2>

      <p class="result-text">
        Your task has been submitted successfully.
        <br>
        Great job explorer 🚀
      </p>

      <button onclick="goHome()">
        Play Again
      </button>

    </div>

  </div>

  <script>

    const tasks = {

      easy: [

        "Find Anything Pink 🌸",

        "Find Anything Green 🟢",

        "Find Anything Yellow 🟡",

        "Find Anything Blue 🔵",

        "Find Anything Red 🔴"

      ],

      medium: [

        "Find a Flower 🌼",

        "Find a Toothpaste 🪥",

        "Find a Cat 🐈",

        "Find a Screwdriver 🪛",

        "Find a Water Bottle 🍼",

        "Find a Shoe 👟",

        "Find a Book 📚"

      ],

      hard: [

        "Find a Domino's Logo 🍕",

        "Find a Building With Neon Lights 🌃",

        "Find a Vintage Object ⏳",

        "Find a Bicycle With a Basket 🚲",

        "Find a Store Signboard 🏪",

        "Find a Unique Graffiti Wall 🎨",

        "Find a Branded Coffee Cup ☕"

      ]

    };

    function startGame() {

      document.getElementById("homePage")
        .classList.remove("active");

      document.getElementById("gamePage")
        .classList.add("active");

      const difficulty =
        document.getElementById("difficulty").value;

      document.getElementById("difficultyText").innerHTML =
        difficulty.toUpperCase() + " MODE";

      const selectedTasks =
        tasks[difficulty];

      const randomTask =
        selectedTasks[
        Math.floor(Math.random() * selectedTasks.length)
        ];

      document.getElementById("task").innerHTML =
        `<b>${randomTask}</b>`;

    }

    function submitTask() {

      const file =
        document.getElementById("imageUpload").files[0];

      if (!file) {

        alert("Please upload an image first!");

        return;
      }

      const username =
        document.getElementById("username").value || "You";

      document.getElementById("leaderboardList").innerHTML =
        `
        <li>
          <span>🥇 ${username}</span>
          <span>30 pts</span>
        </li>

        <li>
          <span>🥈Suraj</span>
          <span>20 pts</span>
        </li>

        <li>
          <span>🥉Muskan</span>
          <span>10 pts</span>
        </li>
    
        `;

      document.getElementById("successMessage").innerHTML =
        "🎉 Task Submitted Successfully";

      setTimeout(() => {

        document.getElementById("gamePage")
          .classList.remove("active");

        document.getElementById("resultPage")
          .classList.add("active");

      }, 5000);

    }

    function goHome() {

      location.reload();
    }

  </script>

</body>

</html>
